- title: "Kafati Art Studio"
  slug: "kafati-art-studio"
  description: "Bilingual gallery and portfolio site for a working artist, with a CMS-powered painting collection and embedded video demonstrations."
  long_description: "Built for my dad — a full artist portfolio with a dynamic painting gallery, biography, process videos, and contact page. Content is managed entirely through Contentful's headless CMS via GraphQL, so the gallery updates without a redeploy. Implemented bilingual support (English/Spanish) using React Context API, and responsive layouts using a custom mobile-detection hook that switches between desktop nav and a mobile side menu. Deployed on the web with native app targets available via Capacitor."
  tech_stack:
    - React
    - TypeScript
    - Ionic
    - Vite
    - Contentful
    - Capacitor
  tags:
    - featured
    - personal
  live_url: "https://www.kafatiartstudio.com/"
  status: production
  position: 1
  featured: true

- title: "Toknsmith"
  slug: "toknsmith"
  description: "A minimal, secure CLI for storing and rotating tokens — so you can stop dreading secret management."
  long_description: "A CLI-first tool for managing sensitive tokens securely, reliably, and without the pain. Supports login/logout with macOS Keychain storage, external token vaulting with encryption-at-rest, and a full GitHub OAuth browser flow that vaults the access token automatically. Built on a zero-trust, split-responsibility model: the CLI, API, and middleware each handle only what they need to — no plaintext secrets anywhere. Powered by Thor for clean command composition, Bearer Auth over HTTPS, and an external encryption layer so the API never sees raw secrets. Support for token TTLs, OAuth token rotation, and additional VCS providers in progress."
  tech_stack:
    - Ruby
    - Thor
    - Rails
    - macOS Keychain
    - OAuth 2.0
  tags:
    - featured
    - security
    - tooling
  github_url: "https://github.com/ToriK17/toknsmith-cli"
  status: in_progress
  position: 2
  featured: true

- title: "Void"
  slug: "void"
  description: "The digital equivalent of yelling into a pillow — an anonymous venting app that extracts the core subject from your rant and visualizes the collective chaos as a live word cloud."
  long_description: "Void is a minimalist web app for venting into the abyss. Users submit short text posts which are processed by a local HuggingFace transformer pipeline (via PyCall) that extracts the core subject matter. Extraction runs as an ActiveJob background job so the UI stays snappy. Extracted subjects feed a live-updating word cloud built with React Wordcloud — a real-time window into the collective emotional chaos. It's therapeutic, anonymous, and very unnecessary. Think of it as a screaming room with data viz."
  tech_stack:
    - React
    - Rails 7
    - Sidekiq
    - Tailwind CSS
    - HuggingFace Transformers
    - PyCall
  tags:
    - featured
    - fun
    - ai
  github_url: "https://github.com/ToriK17/Void"
  status: production
  position: 3
  featured: true

- title: "LittleBridges"
  slug: "littlebridges"
  description: "A mobile app for bilingual storytime — children flip through picture books and hear narration in two languages, with vocabulary hotspots that reinforce word–image connections."
  long_description: "LittleBridges is a calm, story-first reading app for young children (ages 2–6), built mobile-first for iPad. Kids choose a book, flip through pages at their own pace, and hear high-quality narration in English or Spanish — mirroring the way parents naturally point and name things while reading together. Built with React Native and Expo, with React Navigation handling the library-to-reader flow and expo-av powering bilingual audio playback. Books, pages, and audio are structured as modular JSON with locale-keyed content, making multilingual support straightforward to extend. Targeting App Store release."
  tech_stack:
    - React Native
    - Expo
    - expo-av
    - React Navigation
    - Google Cloud TTS
  tags:
    - featured
    - mobile
    - personal
  status: in_progress
  position: 4
  featured: true

